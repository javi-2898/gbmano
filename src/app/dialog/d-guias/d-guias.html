<h2 mat-dialog-title>{{ fun.Diccionario(data.title) | uppercase }} </h2>

<mat-dialog-content class="dialogo-sin-padding"> 
   <mat-card appearance="outlined" style="background: #ffffff;">
      <mat-card-content>
         @for (item of varb.table; track $index) {
            <div class="flex flex-column justify-content-center align-items-center">
               <div class="text-2xl sm:text-2xl md:text-3xl font-bold mb-4 mt-4"> {{item.area}} </div>
               <div class="contenedor-imagen">
                  <img [src]="Get_Imagen(item.imagen, item.area)" alt="Image" class="imagen">
               </div>
               
            </div>
         }
      </mat-card-content>
   </mat-card>
</mat-dialog-content>

<mat-dialog-actions class="flex gap-2">
   <p-button matButton mat-dialog-close label="Cerrar" icon="bi bi-x-circle-fill" severity="danger" variant="outlined" [rounded]="true" />
</mat-dialog-actions>
