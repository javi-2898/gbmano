<h2 mat-dialog-title> {{ data.title | uppercase }} </h2>

<mat-dialog-content class="dialogo-sin-padding"> 
   <mat-card appearance="outlined" style="background: #ffffff;">
      <mat-card-content>
         <div class="col-12 flex flex-wrap">
            <p-iconfield iconPosition="left" class="ml-auto">
               <p-inputicon>
                  <i class="pi pi-search"></i>
               </p-inputicon>
               <input pInputText type="text" class="w-full" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Buscar..." />
            </p-iconfield>
         </div>

         <p-table #dt size="small"
            showGridlines
            [value]="varb.table"
            [loading]="varb.loading"
            [scrollable]="true"
            [customSort]="true"
            scrollHeight="500px"
            [globalFilterFields]="['cve_depto', 'descripcion', 'ddi']"
            (sortFunction)="fun.customSort($event)"
         >
            <ng-template #header>
               <tr>
                  <th pSortableColumn="cve_depto">
                     <div class="flex justify-content-center gap-1 th-general">
                        Clave
                        <p-sortIcon field="cve_depto" />
                     </div>
                  </th>
                  <th pSortableColumn="descripcion">
                     <div class="flex justify-content-center gap-1 th-general">
                        Descripción
                        <p-sortIcon field="descripcion" />
                     </div>
                  </th>
                  <th pSortableColumn="ddi">
                     <div class="flex justify-content-center gap-1 th-general">
                        DDI
                        <p-sortIcon field="ddi" />
                     </div>
                  </th>
               </tr>
            </ng-template>

            <ng-template #body let-item>
               <tr class="cursor" (click)="Open_Dialog_Categoria(item)">
                  <td class="text-center td-general">{{ item.cve_depto }}</td>
                  <td class="text-center td-general">{{ item.descripcion }}</td>
                  <td class="text-center td-general">{{ item.ddi | number: '1.0-2' }}</td>
               </tr>
            </ng-template>

            <ng-template #emptymessage>
               <tr>
                  <td [attr.colspan]="cols">
                     <div class="flex flex-column align-items-center justify-content-center py-4 gap-2">
                        <img src="undraw/warning.svg" height="150" alt="warning" />
                        <div class="alert-table">{{varb.message}}</div>
                     </div>
                  </td>
               </tr>
            </ng-template>

            <ng-template pTemplate="loadingbody">
               <tr>
                  <td [attr.colspan]="cols">
                     <div class="flex flex-col align-items-center justify-content-center py-4 gap-2">
                        <div class="loader-container">
                           <div class="loader"></div>
                           <div class="loader-text">Cargando datos, por favor espere...</div>
                        </div> 
                     </div>
                  </td>
               </tr>
            </ng-template>
         </p-table>
      </mat-card-content>
   </mat-card>
</mat-dialog-content>

<mat-dialog-actions class="flex gap-2">
   <p-button matButton mat-dialog-close label="Cerrar" icon="bi bi-x-circle-fill" severity="danger" variant="outlined" [rounded]="true" />
</mat-dialog-actions>
