<div class="padding-2">
   <div class="col-12 padding flex flex-wrap">
      <div class="col-4 padding">
         <span style="font-size: 1.5rem;">Preguntas</span> 
      </div>
   </div>
</div>

<mat-dialog-content>
   <mat-card appearance="outlined" style="background: #ffffff;">
      <mat-card-content>
         <p-table #dt size="small" scrollHeight="400px"
            [value]="data.Preguntas"
            [loading]="varb.loading"
            [globalFilterFields]="['Seccion', 'Pregunta']"
            [customSort]="true"
            [scrollable]="true"
            (sortFunction)="fun.customSort($event)"
         >
            <ng-template #caption>
               <div class="flex">   
                  <p-iconfield iconPosition="left" class="ml-auto">
                     <p-inputicon>
                        <i class="pi pi-search"></i>
                     </p-inputicon>
                     <input pInputText type="text" class="w-full" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Buscar..." />
                  </p-iconfield>
               </div>
            </ng-template>

            <ng-template #header>
               <tr>
                  <th *ngIf="data.Tipo == 'EJECUCION' ? false : true" pSortableColumn="Seccion">
                     <div class="flex justify-content-center gap-1">
                        Sección
                        <p-sortIcon field="Seccion" />
                     </div>
                  </th>
                  <th *ngIf="varb.selectTipo?.value == 'EJECUCION' ? false : true" pSortableColumn="Pregunta">
                     <div class="flex justify-content-center gap-1">
                        Preguntas
                        <p-sortIcon field="Pregunta" />
                     </div>
                  </th>
               </tr>
            </ng-template>

            <ng-template #body let-item let-rowIndex="rowIndex" let-expanded="expanded">
               <tr>
                  <td *ngIf="data.Tipo == 'EJECUCION' ? false : true" class="text-center">{{ item.Seccion }}</td>
                  <td class="text-center">{{ item.Pregunta }}</td>
               </tr>
            </ng-template>

            <ng-template #emptymessage>
               <tr>
                  <td colspan="2">
                     <div class="flex flex-column align-items-center justify-content-center py-4 gap-2">
                        <img src="undraw/warning.svg" height="150" alt="warning" />
                        <div class="alert-table">{{varb.message}}</div>
                     </div>
                  </td>
               </tr>
            </ng-template>

            <ng-template pTemplate="loadingbody">
               <tr>
                  <td colspan="2">
                     <div class="flex flex-col align-items-center justify-content-center py-4 gap-2">
                        <div class="loader-container">
                           <div class="loader"></div>
                           <div class="loader-text">Cargando datos, por favor espere...</div>
                        </div> 
                     </div>
                  </td>
               </tr>
            </ng-template>
         </p-table>
      </mat-card-content>
   </mat-card>
</mat-dialog-content>

<mat-dialog-actions class="flex gap-2">
   <p-button matButton mat-dialog-close label="Cerrar" icon="bi bi-x-circle-fill" severity="danger" [rounded]="true" />
</mat-dialog-actions>
